<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Exemplo de seletores</h1>

    <h2>Exemplo de PC</h2>

    <div>
        <label for="placa-mae">Placa mãe</label>
        <input type="text" id="placa-mae">
    </div>

    <div>
        <label for="placa-video">Placa de Video</label>
        <select  id="placa-video">
            <option value="gtx-1060">GTX 1060</option>
            <option value="rtx-4070">RTX 4070</option>
        </select>
    </div>

    <button id="limpar-campos">Limpar Campos</button>
    <button id="processar">Processar</button>

    <h2>Calculadora</h2>

    <div>
        <label for="numero01">Numero 01</label>
        <input type="number" id="numero01">
    </div>

    <div>
        <label for="numero02">Numero 02</label>
        <input type="number" id="numero02">
    </div>

    <div>
        <button id="botaoSoma">Somar</button>
    </div>

    <h2>Aluno Calcular Media</h2>

    <div>
        <label for="nome">nome</label>
        <input type="text" id="nome">

        <label for="nota1">nota 1</label>
        <input type="number" id="nota1">

        <label for="nota2">nota 2</label>
        <input type="number" id="nota2">

        <label for="nota3">nota 3</label>
        <input type="number" id="nota3">

        <button id="calcular-media">calcularMedia</button>

        <div id="resultado-media"></div>

    </div>
    

    <script src="assets/js/seletor-id.js"></script>
    
</body>
</html>
